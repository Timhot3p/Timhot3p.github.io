<body>  
     <script>	
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', handleOrientation);     

                function handleOrientation(event) {
                  if ((window.DeviceOrientationEvent) && (window.location.pathname.split('/').pop() == 'pressButton.html')) {      
                      var b = event.beta;
                      var c = event.gamma;
                      
                      b = b + 180;
                      c = c + 90:

                      b = (b / 360) * window.innerHeight;
                      c = (c / 180) * window.innerWidth;

                      document.getElementById('buttonGame').style.top = b + 'px';
                      document.getElementById('buttonGame').style.left = c + 'px'; 
                  }
                }                
            } 
        </script>
      <div id="mobileMenu" class="mobile">
